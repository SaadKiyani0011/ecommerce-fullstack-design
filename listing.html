<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products Listing - Ecommerce</title>
    <!-- Include home.css for common header/nav styles -->
    <link rel="stylesheet" href="assets/css/home.css">
    <!-- Include listing specific styles -->
    <link rel="stylesheet" href="assets/css/listing.css">
    <!-- Using Google Fonts matching home -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="light-theme">

    <!-- 1. HEADER (Logo, Search, User Quick Links) -->
    <header class="top-header">
        <a href="home.html" class="logo-container" style="text-decoration: none;">
            <div style="width: 40px; height: 40px; background: #3b82f6; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 20px;">B</div>
            <span class="brand-name">Brand</span>
        </a>

        <div class="search-container">
            <input class="search-input" type="text" placeholder="Search">
            <select class="category-select">
                <option value="all">All category</option>
            </select>
            <button class="search-btn">Search</button>
        </div>

        <div class="header-actions">
            <!-- Theme Toggle -->
            <button id="theme-toggle" class="theme-toggle-btn">🌙 Dark Mode</button>
            
            <a href="login.html" class="action-item" style="text-decoration: none; color: inherit;">
                <span class="icon">👤</span>
                <span class="label">Profile</span>
            </a>
            <div class="action-item">
                <span class="icon">💬</span>
                <span class="label">Message</span>
            </div>
            <div class="action-item">
                <span class="icon">❤️</span>
                <span class="label">Orders</span>
            </div>
            <div class="action-item">
                <span class="icon">🛒</span>
                <span class="label">My cart</span>
            </div>
        </div>
    </header>

    <!-- 2. MAIN NAVIGATION -->
    <nav class="main-nav">
        <ul class="nav-links">
            <li><button class="all-category-btn">≡ Menu</button></li>
            <li><a href="home.html">Home</a></li>
            <li><a href="listing.html" style="font-weight: bold; color: var(--primary-color);">Product Listing</a></li>
            <li><a href="details.html">Product Details</a></li>
            <li><a href="cart.html">Cart</a></li>
        </ul>
        <div class="nav-preferences">
            <span>English, USD ▾</span>
            <span>Ship to 🇩🇪 ▾</span>
        </div>
    </nav>

    <!-- 3. LISTING MAIN CONTENT -->
    <main class="listing-main">
        
        <!-- Top Bar (Breadcrumb & Category Switcher Demo) -->
        <div class="listing-top-bar">
            <div class="breadcrumb">
                <a href="home.html">Home</a> <span class="divider">></span> <span id="breadcrumb-category">Electronics & Tech</span>
            </div>
            
            <div class="category-tabs" id="category-tabs">
                <button class="cat-btn active" data-cat="electronics">Electronics</button>
                <button class="cat-btn" data-cat="automobile">Automobiles</button>
                <button class="cat-btn" data-cat="clothing">Clothing</button>
                <button class="cat-btn" data-cat="home">Home Interiors</button>
            </div>
        </div>

        <div class="listing-layout">
            <!-- Left Sidebar: Filters -->
            <aside class="filter-sidebar">
                
                <div class="filter-group">
                    <h4>Brands</h4>
                    <div id="filter-brands" class="filter-options">
                        <!-- Populated dynamically by listing.js -->
                    </div>
                </div>

                <div class="filter-group">
                    <h4>Features</h4>
                    <div id="filter-features" class="filter-options">
                        <!-- Populated dynamically by listing.js -->
                    </div>
                </div>

                <div class="filter-group">
                    <h4>Price Range</h4>
                    <div class="filter-options">
                        <label class="custom-radio">
                            <input type="radio" name="price" value="all" checked> 
                            <span>All Prices</span>
                        </label>
                        <label class="custom-radio">
                            <input type="radio" name="price" value="under50"> 
                            <span>Under $50</span>
                        </label>
                        <label class="custom-radio">
                            <input type="radio" name="price" value="50-200"> 
                            <span>$50 - $200</span>
                        </label>
                        <label class="custom-radio">
                            <input type="radio" name="price" value="over200"> 
                            <span>Over $200</span>
                        </label>
                    </div>
                </div>
            </aside>

            <!-- Right Area: Product Grid -->
            <section class="products-section">
                <!-- Controls -->
                <div class="grid-controls">
                    <div class="results-count" id="results-count">0 items found</div>
                    <div class="view-options">
                        <label>Sort by:</label>
                        <select class="sort-select">
                            <option>Best Match</option>
                            <option>Price: Low to High</option>
                            <option>Price: High to Low</option>
                        </select>
                    </div>
                </div>

                <!-- Products Grid -->
                <div class="product-grid" id="product-grid">
                    <!-- Cards will be populated dynamically by listing.js -->
                </div>

                <!-- Pagination -->
                <div class="pagination">
                    <button class="page-btn disabled">Previous</button>
                    <button class="page-btn active">1</button>
                    <button class="page-btn">2</button>
                    <button class="page-btn">3</button>
                    <button class="page-btn">Next</button>
                </div>

            </section>
        </div>
    </main>

    <!-- Script to manage theme (copied logic from home if needed, or link home.js) -->
    <script src="assets/js/listing.js"></script>
</body>
</html>
